<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/>
<title>components-glass-card.html</title>
<link rel="stylesheet" href="_card.css"/>
</head><body>

<section class="card" style="padding:26px;background:linear-gradient(135deg,#0a1628 0%,#102023 40%,#0f2a30 100%);color:#fff">
  <div class="eyebrow eyebrow--mint">Glass card · hero overlay</div>
  <div style="display:flex;gap:12px;align-items:flex-start">
    <div style="background:rgba(255,255,255,0.88);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,0.35);border-radius:20px;padding:18px 22px;color:#0a1628;width:300px;box-shadow:0 8px 40px rgba(0,0,0,0.22),inset 0 1px 0 rgba(255,255,255,0.5)">
      <div style="display:flex;justify-content:space-between;margin-bottom:14px">
        <span style="font-size:11px;font-weight:500;color:#6B7280;letter-spacing:0.04em;text-transform:uppercase">DEPLOYED · Q3</span>
        <span style="font-size:11px;font-weight:600;color:#16a34a;background:rgba(22,163,74,0.10);padding:2px 9px;border-radius:999px">● Live</span>
      </div>
      <div style="margin-bottom:14px">
        <div style="font-size:12px;color:#6B7280;margin-bottom:3px">Denial rate</div>
        <div style="font-size:34px;font-weight:700;color:#0a1628;line-height:1;letter-spacing:-0.02em;font-family:'Geist',sans-serif">−28%</div>
        <div style="font-size:12px;font-weight:500;color:#16a34a;margin-top:2px">↓ first 90 days</div>
      </div>
      <div style="height:1px;background:rgba(0,0,0,0.07);margin-bottom:10px"></div>
      <div style="display:flex;justify-content:space-between;padding:4px 0"><span style="font-size:12px;color:#6B7280">Claims/day</span><span style="font-size:13px;font-weight:600">1,204</span></div>
      <div style="display:flex;justify-content:space-between;padding:4px 0"><span style="font-size:12px;color:#6B7280">No-touch</span><span style="font-size:13px;font-weight:600;color:#16a34a">60%</span></div>
    </div>
  </div>
</section>
</body></html>
