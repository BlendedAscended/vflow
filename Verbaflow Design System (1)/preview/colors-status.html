<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/>
<title>colors-status.html</title>
<link rel="stylesheet" href="_card.css"/>
</head><body>

<section class="card">
  <div class="eyebrow">Status &amp; utility</div>
  <div class="grid-4">
    <div class="swatch" style="background:#16A34A;color:#fff"><div class="swatch__name">Success</div><div class="swatch__hex">#16A34A</div></div><div class="swatch" style="background:#F97316;color:#fff"><div class="swatch__name">Rush</div><div class="swatch__hex">#F97316</div></div><div class="swatch" style="background:#FACC15;color:#fff"><div class="swatch__name">Warning</div><div class="swatch__hex">#FACC15</div></div><div class="swatch" style="background:#EF4444;color:#fff"><div class="swatch__name">Danger</div><div class="swatch__hex">#EF4444</div></div>
  </div>
  <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:4px">
    <span style="display:inline-flex;align-items:center;gap:6px;padding:4px 11px;border-radius:999px;background:rgba(22,163,74,0.10);color:#16A34A;font-size:11px;font-weight:600">● Live · 99.8%</span>
    <span style="display:inline-flex;align-items:center;gap:6px;padding:4px 11px;border-radius:999px;background:rgba(249,115,22,0.18);color:#F97316;font-size:11px;font-weight:700">🔥 Rush rate applies</span>
    <span style="display:inline-flex;align-items:center;gap:6px;padding:4px 11px;border-radius:999px;background:rgba(250,204,21,0.15);color:#A16207;font-size:11px;font-weight:600">Pending review</span>
    <span style="display:inline-flex;align-items:center;gap:6px;padding:4px 11px;border-radius:999px;background:rgba(239,68,68,0.12);color:#B91C1C;font-size:11px;font-weight:600">Action required</span>
  </div>
</section>
</body></html>
