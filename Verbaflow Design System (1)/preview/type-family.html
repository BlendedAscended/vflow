<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/>
<title>type-family.html</title>
<link rel="stylesheet" href="_card.css"/>
</head><body>

<section class="card">
  <div class="eyebrow">Type family</div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:18px">
    <div>
      <div style="font-family:'Geist',sans-serif;font-size:46px;font-weight:500;line-height:1;letter-spacing:-0.02em;color:#102023">Aa</div>
      <div style="margin-top:6px;font-size:13px;font-weight:600">Geist Sans</div>
      <div class="mono" style="color:#6B7280;margin-top:2px">300 · 400 · 500 · 600 · 700 · 800 · 900</div>
      <div style="font-size:11px;color:#6B7280;margin-top:6px">Display + body. Hero headlines run at <b>weight 500</b>.</div>
    </div>
    <div>
      <div style="font-family:'Geist Mono',ui-monospace,monospace;font-size:46px;font-weight:500;line-height:1;color:#102023">Aa</div>
      <div style="margin-top:6px;font-size:13px;font-weight:600">Geist Mono</div>
      <div class="mono" style="color:#6B7280;margin-top:2px">400 · 500 · 600</div>
      <div style="font-size:11px;color:#6B7280;margin-top:6px">Metrics, code, eyebrows, token labels.</div>
    </div>
  </div>
</section>
</body></html>
