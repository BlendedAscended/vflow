<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/>
<title>spacing-radii.html</title>
<link rel="stylesheet" href="_card.css"/>
</head><body>

<section class="card">
  <div class="eyebrow">Radii scale</div>
  <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:8px;align-items:end">
    
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
        <div style="width:60px;height:60px;background:#A5D6A7;border-radius:8px;border:1px solid rgba(0,0,0,0.06)"></div>
        <div class="mono" style="font-size:10px;color:#6B7280">8px</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
        <div style="width:60px;height:60px;background:#A5D6A7;border-radius:12px;border:1px solid rgba(0,0,0,0.06)"></div>
        <div class="mono" style="font-size:10px;color:#6B7280">12px</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
        <div style="width:60px;height:60px;background:#A5D6A7;border-radius:16px;border:1px solid rgba(0,0,0,0.06)"></div>
        <div class="mono" style="font-size:10px;color:#6B7280">16px</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
        <div style="width:60px;height:60px;background:#A5D6A7;border-radius:20px;border:1px solid rgba(0,0,0,0.06)"></div>
        <div class="mono" style="font-size:10px;color:#6B7280">20px</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
        <div style="width:60px;height:60px;background:#A5D6A7;border-radius:24px;border:1px solid rgba(0,0,0,0.06)"></div>
        <div class="mono" style="font-size:10px;color:#6B7280">24px</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
        <div style="width:60px;height:60px;background:#A5D6A7;border-radius:32px;border:1px solid rgba(0,0,0,0.06)"></div>
        <div class="mono" style="font-size:10px;color:#6B7280">32px</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
        <div style="width:60px;height:60px;background:#A5D6A7;border-radius:9999px;border:1px solid rgba(0,0,0,0.06)"></div>
        <div class="mono" style="font-size:10px;color:#6B7280">pill</div>
      </div>
  </div>
  <div style="margin-top:4px;font-size:11px;color:#6B7280">Cards: 16–24px · CTAs &amp; chips: pill · Hero containers: 20–32px</div>
</section>
</body></html>
