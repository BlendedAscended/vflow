<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/>
<title>spacing-shadows.html</title>
<link rel="stylesheet" href="_card.css"/>
</head><body>

<section class="card">
  <div class="eyebrow">Shadow system</div>
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;padding:8px 0 14px">
    <div style="background:#fff;border-radius:14px;padding:14px;box-shadow:0 10px 25px -5px rgba(0,0,0,0.10),0 10px 10px -5px rgba(0,0,0,0.04)">
      <div style="font-size:12px;font-weight:600">Elegant</div>
      <div class="mono" style="font-size:10px;color:#6B7280;margin-top:4px">general cards</div>
    </div>
    <div style="background:#fff;border-radius:14px;padding:14px;box-shadow:0 0 24px rgba(165,214,167,0.45)">
      <div style="font-size:12px;font-weight:600">Glow</div>
      <div class="mono" style="font-size:10px;color:#6B7280;margin-top:4px">mint emphasis</div>
    </div>
    <div style="background:#A5D6A7;border-radius:14px;padding:14px;color:#102023;box-shadow:inset 1px 2px 5px rgba(0,0,0,0.45),inset 0 1px 0 rgba(255,255,255,0.35)">
      <div style="font-size:12px;font-weight:700">13g inset</div>
      <div class="mono" style="font-size:10px;opacity:0.6;margin-top:4px">primary nav CTA</div>
    </div>
  </div>
  <div class="token-row"><span class="k">shadow-elegant</span><span class="v">0 10px 25px -5px rgba(0,0,0,.10)</span></div>
  <div class="token-row"><span class="k">shadow-glow</span><span class="v">0 0 20px rgba(165,214,167,.30)</span></div>
  <div class="token-row"><span class="k">shadow-13g</span><span class="v">inset 1px 2px 5px rgba(0,0,0,.45)</span></div>
</section>
</body></html>
