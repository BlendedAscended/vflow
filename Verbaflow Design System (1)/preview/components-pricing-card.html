<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/>
<title>components-pricing-card.html</title>
<link rel="stylesheet" href="_card.css"/>
</head><body>

<section class="card card--slate" style="padding:24px;background:#222E3C">
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
    <div style="background:#102023;border:1px solid #2F4144;border-radius:24px;padding:20px;color:#E5F3E3;box-shadow:none;transform:none">
        <h3 style="font-size:22px;font-weight:800;color:#fff;margin-bottom:6px;font-family:'Geist',sans-serif">Scope</h3>
        <p style="font-size:11px;color:#D1EBCE;opacity:0.7;line-height:1.4;margin-bottom:14px">Scoping, architecture &amp; working PoC.</p>
        <div style="display:flex;align-items:baseline;margin-bottom:14px">
          <span style="font-size:34px;font-weight:800;color:#fff;font-family:'Geist',sans-serif">$895</span>
          <span style="color:#D1EBCE;margin-left:6px;font-size:13px">– $2,495</span>
        </div>
        <button style="width:100%;padding:11px 14px;border-radius:14px;background:transparent;border:2px solid #A5D6A7;color:#E5F3E3;font-weight:700;font-size:12px">Start scoping</button>
        <div style="margin-top:14px;display:flex;flex-direction:column;gap:6px">
          <div style="display:flex;gap:6px;font-size:11px;color:#D1EBCE"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#A5D6A7" stroke-width="2.5"><path d="M5 13l4 4L19 7"/></svg>Architecture map</div><div style="display:flex;gap:6px;font-size:11px;color:#D1EBCE"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#A5D6A7" stroke-width="2.5"><path d="M5 13l4 4L19 7"/></svg>Proof-of-concept</div><div style="display:flex;gap:6px;font-size:11px;color:#D1EBCE"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#A5D6A7" stroke-width="2.5"><path d="M5 13l4 4L19 7"/></svg>30-day handoff</div>
        </div>
      </div><div style="background:#2D2D4B;border:2px solid rgba(165,214,167,0.7);border-radius:24px;padding:20px;color:#E5F3E3;box-shadow:0 0 20px rgba(165,214,167,0.30);transform:scale(1.02)">
        <h3 style="font-size:22px;font-weight:800;color:#fff;margin-bottom:6px;font-family:'Geist',sans-serif">Deploy</h3>
        <p style="font-size:11px;color:#D1EBCE;opacity:0.7;line-height:1.4;margin-bottom:14px">Production multi-agent build, handed off live.</p>
        <div style="display:flex;align-items:baseline;margin-bottom:14px">
          <span style="font-size:34px;font-weight:800;color:#fff;font-family:'Geist',sans-serif">$2,495</span>
          <span style="color:#D1EBCE;margin-left:6px;font-size:13px">– $5,995</span>
        </div>
        <button style="width:100%;padding:11px 14px;border-radius:14px;background:#A5D6A7;border:none;color:#000;font-weight:700;font-size:12px">Get deployed</button>
        <div style="margin-top:14px;display:flex;flex-direction:column;gap:6px">
          <div style="display:flex;gap:6px;font-size:11px;color:#D1EBCE"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#A5D6A7" stroke-width="2.5"><path d="M5 13l4 4L19 7"/></svg>Production build</div><div style="display:flex;gap:6px;font-size:11px;color:#D1EBCE"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#A5D6A7" stroke-width="2.5"><path d="M5 13l4 4L19 7"/></svg>Compliance layer</div><div style="display:flex;gap:6px;font-size:11px;color:#D1EBCE"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#A5D6A7" stroke-width="2.5"><path d="M5 13l4 4L19 7"/></svg>Observability</div>
        </div>
      </div>
  </div>
</section>
</body></html>
