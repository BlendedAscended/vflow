name: cybergrowth-wireframe
description: VerbaFlow Growth Plan customer journey. Takes wizard data + GBP data, produces implementation plan plus wireframe via Stitch, delivers via email.
version: 2
owner: san@verbaflowllc.com
created: 2026-05-11
updated: 2026-05-14

trigger:
  type: webhook
  endpoint: /jobs/growth-plan
  auth: bearer
  secret_env: VFLOW_HERMES_TOKEN

inputs:
  plan_id:
    type: string
    required: true
    description: cuid from Postgres growth_plans row
  wizard_data:
    type: object
    required: true
    description: industry, stage, challenges, goals, teamSize, budget, timeline, email, name, subNiches, currentStack, legacyPain
  gbp_data:
    type: object
    required: false
    description: Google Business Profile data from wizard GBP step
  services_catalog:
    type: array
    required: true
    description: ServiceDef objects loaded from src/data/services.ts plus Supabase services table
  industries_catalog:
    type: array
    required: true
    description: Industry objects from src/data/industries.ts
  callback_url:
    type: string
    required: true
    description: URL Hermes pings after each stage transition

context_budget: 8000
compression_threshold: 0.4
compression_target: 0.2

stages:
  - name: architect
    agent: architect-agent
    model: gemini-2-5-pro
    fallback: gemini-2-5-flash
    timeout: 180
    inputs:
      - wizard_data
      - gbp_data
      - services_catalog
      - industries_catalog
    outputs:
      - implementation_plan.md
      - architecture.json
    on_start: status_update(queued -> drafting)
    on_success: status_update(drafting -> designing)
    on_failure: status_update(drafting -> failed)

  - name: designer
    type: tool_invocation
    tool: mcp__stitch__generate_screen_from_text
    inputs:
      projectId: "14405041833567191224"
      designSystem: "assets/d410c1c8f34f4018985f8141eec9ef5a"
      deviceType: DESKTOP
      modelId: GEMINI_3_1_PRO
      prompt: "{templated from architecture.json + wizard_data + gbp_data}"
    poll:
      after_seconds: 30
      max_attempts: 10
      tool: mcp__stitch__get_screen
    outputs:
      - screen_name
      - screen_data
    on_success: status_update(designing -> backend)
    on_failure: status_update(designing -> failed)

  - name: backend
    agent: backend-agent
    model: gemini-2-5-flash
    fallback: gemini-2-5-pro
    timeout: 180
    inputs:
      - architecture.json
      - gbp_data
    outputs:
      - integration_notes.md
    on_success: status_update(backend -> validating)
    on_failure: status_update(backend -> failed)

  - name: validator
    agent: validator-agent
    model: gemini-2-5-pro
    fallback: gemini-2-5-flash
    timeout: 90
    inputs:
      - implementation_plan.md
      - screen_data
      - integration_notes.md
    outputs:
      - validation_report.json
    gate:
      score_field: validation_report.json.overall_score
      score_min: 0.7
      on_fail: retry_stage(designer, max_retries=1)
    on_success: status_update(validating -> marketing)
    on_failure: status_update(validating -> failed)

  - name: marketing
    agent: marketing-agent
    model: gemini-2-5-flash
    fallback: gemini-2-5-pro
    timeout: 120
    inputs:
      - implementation_plan.md
      - screen_data
      - validation_report.json
    outputs:
      - upsell_pamphlet.md
      - email_body.html
    on_success: status_update(marketing -> plan_ready)
    on_failure: status_update(marketing -> failed)

  - name: delivery
    type: deterministic
    inputs:
      - screen_data
      - email_body.html
    actions:
      - upload_to_supabase:
          bucket: wireframes
          key: "{plan_id}/wireframe.png"
      - generate_signed_url:
          expiry_days: 90
          out_var: wireframe_signed_url
      - send_email_via_resend:
          template: wireframe_ready
          to: "{wizard_data.email}"
          from: plans@verbaflowllc.com
          variables:
            name: "{wizard_data.name}"
            wireframe_url: "{wireframe_signed_url}"
            plan_id: "{plan_id}"
      - callback:
          method: POST
          url: "{callback_url}"
          headers:
            Authorization: "Bearer {VFLOW_HERMES_TOKEN}"
          body:
            plan_id: "{plan_id}"
            status: wireframe_ready
            wireframe_url: "{wireframe_signed_url}"
    on_success: status_update(delivery -> wireframe_ready)

artifacts:
  storage: supabase
  bucket: wireframes
  prefix: "{plan_id}/"

webui:
  kanban:
    board: "Growth Plans"
    columns:
      - Queued
      - Drafting
      - Designing
      - Backend
      - Validating
      - Marketing
      - Plan Ready
      - Delivery
      - Delivered
      - Failed
    card_template:
      title: "Plan {plan_id} - {wizard_data.industry}"
      labels:
        - "{wizard_data.stage}"
        - "{wizard_data.budget}"
        - "{wizard_data.timeline}"
      body: |
        Email: {wizard_data.email}
        Name: {wizard_data.name}
        Challenges: {wizard_data.challenges | join(', ')}
        Stack: {wizard_data.currentStack | join(', ')}
        SubNiches: {wizard_data.subNiches | join(', ')}
        GBP: {gbp_data.name | default('Not provided')}

  tasks:
    auto_create_per_stage: true
    task_template:
      title: "Plan {plan_id} - {stage_name}"
      assignee: "{agent_name}"
      due_at: "{stage_started_at + stage_timeout}"

  space:
    auto_create_per_plan: true
    space_template:
      name: "plan-{plan_id}"
      auto_attach_artifacts: true
